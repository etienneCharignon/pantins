<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les pantins</title>
  <link rel="icon" type="image/png" href="tete1.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="stylesheet" href="pantin.css">
  <script async defer data-domain="etiennecharignon.github.io" src="https://plausible.ut7.fr/js/plausible.js"></script>
</head>

<body>
  <h1>Les pantins de Bernadette</h1>

  <div class="pantin" id="pantin"></div>

  <div class="dots" id="dots-tete"></div>
  <div class="dots" id="dots-corps"></div>
  <div class="dots" id="dots-pieds"></div>

  <button class="info-link" aria-label="Informations"
    onclick="document.getElementById('info-panel').showModal()">i</button>

  <dialog id="info-panel">
    <h2>Polichinelle (1970)</h2>
    <p>Publié dans la revue <em>Pomme d'Api</em><br>
      Encre et crayon (10×30 mm)</p>
    <p>Faites glisser les images…</p>
    <a href="https://bernadettedespres.fr" target="_blank" rel="noopener">bernadettedespres.fr</a>
    <button class="close" onclick="document.getElementById('info-panel').close()" aria-label="Fermer">×</button>
  </dialog>
  <script src="pantin.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>

</html>
